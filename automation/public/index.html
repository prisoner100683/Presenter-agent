<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Awesome Presenter Automation</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Semi-Automated Flow</p>
          <h1>Awesome Presenter Automation</h1>
          <p class="lede">
            选择一个 PPTX 文件，绑定一个 OpenAI-compatible 模型配置，然后把讲解型静态网页生成到本地归档目录。
          </p>
        </div>
        <div class="hero-meta">
          <span>本地 GUI</span>
          <span>无额外依赖</span>
          <span>PPTX → Static Site</span>
        </div>
      </header>

      <main class="workspace">
        <section class="panel panel--profiles">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Model Profiles</p>
              <h2>模型配置</h2>
            </div>
            <button class="ghost-button" id="reset-profile" type="button">新建配置</button>
          </div>

          <label class="field">
            <span>已保存配置</span>
            <select id="profile-select">
              <option value="">请选择</option>
            </select>
          </label>

          <div class="field-grid">
            <label class="field">
              <span>昵称</span>
              <input id="profile-nickname" type="text" placeholder="例如：OpenAI Prod">
            </label>
            <label class="field">
              <span>模型名</span>
              <input id="profile-model" type="text" placeholder="例如：gpt-4.1">
            </label>
          </div>

          <label class="field">
            <span>Base URL</span>
            <input id="profile-base-url" type="url" placeholder="https://api.openai.com/v1">
          </label>

          <label class="field">
            <span>API Key</span>
            <input id="profile-api-key" type="password" placeholder="sk-...">
          </label>

          <div class="button-row">
            <button class="primary-button" id="save-profile" type="button">保存配置</button>
            <button class="ghost-button" id="delete-profile" type="button">删除配置</button>
          </div>

          <div class="profile-hint" id="profile-hint"></div>
        </section>

        <section class="panel panel--job">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Generation Job</p>
              <h2>生成任务</h2>
            </div>
          </div>

          <div class="field-grid">
            <label class="field">
              <span>项目名</span>
              <input id="job-project-name" type="text" placeholder="留空则取 PPTX 文件名">
            </label>
            <label class="field">
              <span>场景</span>
              <input id="job-scenario" type="text" placeholder="课程讲解 / 路演汇报 / 活动宣讲">
            </label>
          </div>

          <div class="field-grid">
            <label class="field">
              <span>受众</span>
              <input id="job-audience" type="text" placeholder="学生 / 客户 / 评委 / 团队">
            </label>
            <label class="field">
              <span>风格</span>
              <input id="job-style" type="text" placeholder="专业 / 科技 / 学术 / 品牌化">
            </label>
          </div>

          <label class="field">
            <span>技术栈</span>
            <input id="job-stack" type="text" value="Vanilla HTML/CSS/JS">
          </label>

          <label class="upload-zone" for="job-file">
            <input id="job-file" type="file" accept=".pptx">
            <span class="upload-label">上传 PPTX 文件</span>
            <span class="upload-detail" id="upload-detail">目前仅支持 `.pptx`。</span>
          </label>

          <div class="button-row">
            <button class="primary-button primary-button--wide" id="run-job" type="button">开始生成</button>
          </div>

          <div class="status-card" id="job-status">等待任务。</div>
          <div class="result-card" id="job-result" hidden>
            <p class="result-kicker">Result Link</p>
            <a id="preview-link" href="#" target="_blank" rel="noopener noreferrer"></a>
            <p id="result-meta"></p>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
